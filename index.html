<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>EduShop Demo</title>

<!-- Google Analytics -->

<script async src="https://www.googletagmanager.com/gtag/js?id=G-5ZT0GRB0FZ"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-5ZT0GRB0FZ');
</script>

<style>
body{
font-family: Arial;
background:#f5f5f5;
padding:20px;
}

h2{
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:10px;
background:blue;
color:white;
border:none;
margin-top:10px;
cursor:pointer;
}
</style>

</head>

<body>

<h2>EduShop Demo</h2>

<div class="grid" id="products"></div>

<script>

const products=[
{name:"Headphones",price:299},
{name:"T-Shirt",price:499},
{name:"Wallet",price:199},
{name:"Monitor",price:899}
];

const container=document.getElementById("products");

products.forEach(p=>{
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick="addToCart('${p.name}')">Add to Cart</button>
`;

container.appendChild(div);
});

function addToCart(name){
gtag('event','add_to_cart',{
item_name:name
});
alert(name+" added!");
}

</script>

</body>
</html>
